<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Lidex</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(ellipse at 30% 20%, #0d4a3a 0%, #0b0f1a 55%);
        color: rgba(255, 255, 255, 0.92);
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.75rem;
        letter-spacing: 0.02em;
      }
      p {
        margin: 0;
        max-width: 22rem;
        line-height: 1.5;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.65);
      }
      code {
        font-size: 0.78rem;
        background: rgba(0, 0, 0, 0.35);
        padding: 0.15rem 0.4rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Lidex</h1>
    <p>
      If you see this screen, set <code>server.url</code> in <code>capacitor.config.json</code> to your deployed Next.js URL, then run
      <code>npx cap sync android</code>.
    </p>
  </body>
</html>
